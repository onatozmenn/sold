<!DOCTYPE html>
<!--
  YALNIZCA demo/test amaçlı örnek dosya. Gerçek bir siteden alınmamıştır ve
  hiçbir siteye istek atılmaz. Gerçek parser'lar ilgili sitenin ToS'una uygun
  şekilde ayrıca yazılır. Kişisel veri (ad, telefon) İÇERMEZ.
-->
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <title>Örnek İlan</title>
  </head>
  <body>
    <div class="listing">
      <span data-field="id">DEMO-1001</span>
      <span data-field="listing_type">sale</span>
      <span data-field="price">2.500.000 TL</span>
      <span data-field="currency">TRY</span>
      <span data-field="province">İstanbul</span>
      <span data-field="district">Kadıköy</span>
      <span data-field="neighborhood">Caferağa</span>
      <span data-field="lat">40,9876</span>
      <span data-field="lon">29,0258</span>
      <span data-field="gross_m2">120</span>
      <span data-field="room_count">2+1</span>
      <span data-field="building_age">5</span>
      <span data-field="floor">3</span>
      <span data-field="heating">Kombi (Doğalgaz)</span>
    </div>
  </body>
</html>
