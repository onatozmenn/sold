name: Analiz & Rapor

# Etiket dosyası değişince VEYA haftalık VEYA elle çalışır; modeli/analizi
# GitHub'da (bilgisayar olmadan) çalıştırıp datasets/report.md'yi günceller.
on:
  push:
    paths:
      - "datasets/ground_truth.csv" # yeni gerçek satış eklendiğinde
  schedule:
    - cron: "0 7 * * 1" # her Pazartesi 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bağımlılıkları kur
        run: pip install -e ".[model]"
      - name: Raporu üret
        run: python scripts/build_report.py
      - name: Değiştiyse commit'le
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datasets/report.md
          if git diff --staged --quiet; then
            echo "Değişiklik yok."
          else
            git commit -m "chore: analiz raporu güncellendi ($(date -u +%Y-%m-%d))"
            git push
          fi
